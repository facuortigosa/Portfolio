<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BACÁN — OBRA DIGITAL</title>

<style>
:root{
  --violeta:#4B1D8F;
  --amarillo:#FFC700;
  --blanco:#F7F5F2;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial Black, Helvetica, sans-serif;
  overflow:hidden;
  background:var(--blanco);
}

/* NAV SUPERIOR */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:var(--violeta);
  color:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  z-index:9000;
}

nav a{
  background:var(--amarillo);
  color:var(--violeta);
  padding:12px 24px;
  border-radius:40px;
  font-weight:900;
  text-decoration:none;
}

/* FOOTER DESKTOP NAV */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:var(--violeta);
  color:var(--amarillo);
  display:flex;
  justify-content:center;
  gap:60px;
  padding:15px 0;
  font-weight:900;
  z-index:9000;
}

footer span{
  cursor:pointer;
  transition:.3s;
}

footer span:hover{
  transform:scale(1.2);
}

/* WORLD */
.world{
  display:flex;
  width:500vw;
  height:100vh;
  transition:transform 1s cubic-bezier(.77,0,.175,1);
}

.scene{
  width:100vw;
  height:100vh;
  flex-shrink:0;
  position:relative;
  overflow:hidden;
  padding:120px 60px;
}

/* VARIANTES FONDO */
.white{
  background:var(--blanco);
  color:var(--violeta);
}

.purple{
  background:var(--violeta);
  color:var(--amarillo);
}

/* TEXTO GIGANTE */
.massive{
  position:absolute;
  font-size:160px;
  line-height:0.85;
  font-weight:900;
  transform:rotate(-8deg);
}

.purple .massive{
  color:var(--amarillo);
}

.white .massive{
  color:var(--violeta);
}

/* FLASH */
.flash{
  position:absolute;
  font-size:190px;
  font-weight:900;
  transform:rotate(8deg);
}

/* IMÁGENES */
.food{
  position:absolute;
  width:500px;
  filter:drop-shadow(0px 50px 40px rgba(0,0,0,0.15));
}

/* MOBILE */
@media(max-width:768px){

body{overflow:auto;}

.world{
  flex-direction:column;
  width:100%;
  height:auto;
}

.scene{
  height:auto;
  padding:140px 30px;
}

.massive, .flash{
  position:relative;
  font-size:80px;
  transform:none;
  margin-bottom:30px;
}

.food{
  position:relative;
  width:100%;
  margin-top:40px;
}

footer{display:none;}
}
</style>
</head>

<body>

<nav>
  <div>BACÁN</div>
  <a href="#">PEDIR</a>
</nav>

<div class="world" id="world">

<!-- 1 -->
<section class="scene white">
  <div class="massive" style="top:30%; left:10%;">NO ES</div>
  <div class="flash" style="top:50%; left:20%; color:var(--amarillo);">COMIDA</div>
  <div class="massive" style="top:70%; left:5%;">RÁPIDA</div>
  <img class="food" src="https://pngimg.com/d/burger_PNG4135.png" style="right:10%; bottom:5%; transform:rotate(-12deg);">
</section>

<!-- 2 -->
<section class="scene purple">
  <div class="massive" style="top:35%; left:15%;">ES</div>
  <div class="flash" style="top:55%; left:30%; color:var(--amarillo);">ACTITUD</div>
</section>

<!-- 3 -->
<section class="scene white">
  <div class="massive" style="top:30%; left:10%;">ES</div>
  <div class="flash" style="top:50%; left:20%; color:var(--amarillo);">CULTURA</div>
  <img class="food" src="https://pngimg.com/d/french_fries_PNG51.png" style="right:15%; top:40%; transform:rotate(14deg);">
</section>

<!-- 4 -->
<section class="scene purple">
  <div class="massive" style="top:35%; left:10%;">LLEVÁ</div>
  <div class="flash" style="top:55%; left:30%; color:var(--amarillo);">BIEN</div>
  <div class="massive" style="top:70%; left:15%;">BACÁN</div>
</section>

<!-- 5 -->
<section class="scene white">
  <div class="massive" style="top:40%; left:20%;">MANIFIESTO</div>
</section>

</div>

<footer>
  <span onclick="goTo(0)">01</span>
  <span onclick="goTo(1)">02</span>
  <span onclick="goTo(2)">03</span>
  <span onclick="goTo(3)">04</span>
  <span onclick="goTo(4)">05</span>
</footer>

<script>
let current = 0;
const world = document.getElementById("world");
const total = 4;

function goTo(index){
  current = index;
  world.style.transform = `translateX(-${current * 100}vw)`;
}

window.addEventListener("wheel", (e)=>{
  if(window.innerWidth > 768){
    if(e.deltaY > 0 && current < total){
      current++;
    } else if(e.deltaY < 0 && current > 0){
      current--;
    }
    goTo(current);
  }
});
</script>

</body>
</html>
